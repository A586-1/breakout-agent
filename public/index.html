/* HEADER */
.hdr{padding:20px 16px 12px;position:sticky;top:0;z-index:10;background:#07090d}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.ttl{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:2px;text-shadow:0 0 30px #00ff9530}
.ttl span{color:#00ff95}
.sub{color:#7788aa;font-size:11px;margin-top:3px}
.rbtn{background:transparent;border:1px solid #2a3a50;border-radius:10px;padding:8px 12px;color:#8899aa;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px}
.rbtn:disabled{color:#00ff9580;cursor:not-allowed}
.spin{animation:spin 0.8s linear infinite;display:inline-block}
.pb{height:2px;background:#1e2530;border-radius:2px;margin:10px 0;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#00ff95,#00bfff);border-radius:2px;transition:width 0.3s}

/* STATS */
.stats{display:flex;gap:8px;margin:12px 0}
.stat{flex:1;background:#0a0f14;border:1px solid #141c24;border-radius:10px;padding:10px 0;text-align:center}
.sv{font-family:'Orbitron',monospace;font-size:24px;font-weight:700}
.sv.g{color:#00ff95;text-shadow:0 0 12px #00ff9540}
.sl{color:#7788aa;font-size:11px;letter-spacing:1px;margin-top:2px}

/* FILTERS & SORTS */
.flts{display:flex;gap:8px;margin-bottom:8px}
.fb{flex:1;padding:9px 0;border-radius:8px;background:transparent;border:1px solid #2a3a50;color:#8899aa;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:1px}
.fb.on{background:#00ff9515;border-color:#00ff9550;color:#00ff95}
.tfs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.tfs::-webkit-scrollbar{display:none}
.tf{flex:0 0 auto;padding:7px 12px;border-radius:8px;background:transparent;border:1px solid #2a3a50;color:#8899aa;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer}
.tf.on{background:#00bfff15;border-color:#00bfff50;color:#00bfff}
.div{height:1px;background:linear-gradient(90deg,transparent,#1e2530,transparent);margin-bottom:12px}

/* COIN CARDS */
.coins{padding:0 16px}
.card{background:#0d1117;border:1px solid #1e2530;border-radius:16px;padding:16px;margin-bottom:12px;animation:fadeIn 0.3s ease both;cursor:pointer}
.card:active{opacity:0.8}
.card.hot{background:linear-gradient(135deg,#0d1117,#0d1a0f);border-color:#00ff9540;box-shadow:0 0 20px #00ff9510}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cname{display:flex;align-items:center;gap:8px}
.csym{font-weight:700;font-size:22px;color:#ffffff}
.abadge{background:#00ff9520;color:#00ff95;border:1px solid #00ff9540;border-radius:20px;padding:2px 8px;font-size:11px}
.cprice{color:#ffffff;font-size:20px;margin-top:4px;font-weight:700}
.cright{text-align:right}
.cchg{font-size:20px;font-weight:700;margin-bottom:4px}
.cstats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.cs{color:#aabbcc;font-size:15px;font-weight:700}
.cs span{color:#ffffff;font-weight:700}
.cs span.ht{color:#ff8c00;font-weight:700}
.cs span.cl{color:#00bfff;font-weight:700}
.sigs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;margin-top:4px}
.sig{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:13px;white-space:nowrap}
.aibtn{background:transparent;border:1px solid #00ff9540;color:#00ff95;border-radius:8px;padding:10px 14px;font-size:14px;font-family:'Space Mono',monospace;cursor:pointer;width:100%;letter-spacing:1px}
.tap-hint{color:#2a4a6a;font-size:10px;text-align:right;margin-top:6px}

/* DETAIL PAGE */
.detail{display:none;position:fixed;inset:0;background:#07090d;z-index:50;overflow-y:auto;padding:16px;max-width:480px;margin:0 auto}
.detail.open{display:block}
.dbk{background:transparent;border:1px solid #2a3a50;color:#8899aa;border-radius:8px;padding:8px 14px;font-family:'Space Mono',monospace;font-size:12px;cursor:pointer;margin-bottom:16px}
.dttl{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#fff;margin-bottom:4px}
.dprice{font-size:32px;font-weight:700;color:#ffffff;margin-bottom:4px}
.dchg{font-size:20px;font-weight:700;margin-bottom:16px}
.dtfs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px}
.dtfs::-webkit-scrollbar{display:none}
.dtf{flex:0 0 auto;padding:8px 14px;border-radius:8px;background:transparent;border:1px solid #2a3a50;color:#8899aa;font-family:'Space Mono',monospace;font-size:13px;cursor:pointer}
.dtf.on{background:#00bfff15;border-color:#00bfff50;color:#00bfff}
.chart-wrap{background:#0a0f14;border:1px solid #1e2530;border-radius:12px;padding:12px;margin-bottom:16px}
.chart-title{color:#7788aa;font-size:11px;margin-bottom:8px;letter-spacing:1px}
canvas{width:100%;border-radius:6px}
.dstats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.dst{background:#0a0f14;border:1px solid #1e2530;border-radius:10px;padding:12px 16px;flex:1;min-width:80px}
.dst-label{color:#7788aa;font-size:10px;letter-spacing:1px;margin-bottom:4px}
.dst-val{color:#ffffff;font-size:18px;font-weight:700}
.dst-val.ht{color:#ff8c00}
.dst-val.cl{color:#00bfff}
.dsigs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.dsrc{color:#2a4a6a;font-size:10px;margin-bottom:16px}
.live-dot{display:inline-block;width:6px;height:6px;background:#00ff95;border-radius:50%;margin-right:4px;animation:pulse 1s infinite}

/* OTHER */
.empty{text-align:center;padding:50px 20px;color:#2a3a4a;font-size:13px;line-height:2}
.errbx{background:#ff4d4d10;border:1px solid #ff4d4d40;border-radius:12px;padding:20px;text-align:center;color:#ff4d4d;font-size:12px;line-height:1.8;margin:0 16px 16px}
.errbt{display:block;margin:12px auto 0;background:#ff4d4d20;border:1px solid #ff4d4d40;color:#ff4d4d;border-radius:8px;padding:8px 20px;font-family:'Space Mono',monospace;cursor:pointer}
.ov{position:fixed;inset:0;background:#000000bb;z-index:100;display:flex;align-items:flex-end;padding:16px}
.pan{background:#0d1117;border:1px solid #00ff9550;border-radius:20px;padding:20px;width:100%;max-width:480px;margin:0 auto}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pt{color:#00ff95;font-weight:700;font-size:16px}
.xbtn{background:none;border:none;color:#5a6a7a;font-size:22px;cursor:pointer}
.pb2{background:#070d12;border-radius:12px;padding:16px;min-height:80px;color:#c9d5e0;font-size:14px;line-height:1.8;border:1px solid #1a2230}
.ana{color:#00ff9570;animation:pulse 1s infinite}
.ftr{text-align:center;padding:20px 16px;color:#2a3a4a;font-size:10px;line-height:1.8}

  {sym:"BLUR",cg:"blur",kr:"BLUR"},
  {sym:"RAY",cg:"raydium",kr:"RAY"},
  {sym:"TIA",cg:"celestia",kr:"TIA"},
  {sym:"DOT",cg:"polkadot",kr:"DOT"},
  {sym:"BIGTIME",cg:"big-time",kr:"BIGTIME"},
  {sym:"TRUMP",cg:"official-trump",kr:"TRUMP"},
  {sym:"MELANIA",cg:"melania-meme",kr:"MELANIA"},

  {sym:"PUMP",cg:"pump-fun",kr:"PUMP"}
];

// ── DETAIL STATE ───────────────────────────────────────────
let detailCoin=null, detailTF='1m', detailData=null, liveInterval=null, priceChartInstance=null, rsiChartInstance=null;

// ── KRAKEN INTERVALS ───────────────────────────────────────
const KR_INT={'1m':1,'5m':5,'15m':15,'30m':30,'1h':60,'4h':240,'1D':1440,'1W':10080};

// ── UTILITIES ──────────────────────────────────────────────
let all=[],filt='all',sortBy='signals';
const fmt=n=>{if(n==null||isNaN(n))return'N/A';if(n>=1000)return n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});if(n>=1)return n.toFixed(2);if(n>=0.01)return n.toFixed(4);return n.toFixed(8)};
function calcRSI(p,per=14){if(!p||p.length<per+1)return null;let g=0,l=0;for(let i=p.length-per;i<p.length;i++){const d=p[i]-p[i-1];d>0?g+=d:l+=Math.abs(d)}const al=l/per;return al===0?100:100-100/(1+(g/per)/al)}
function calcMA(p,per){if(!p||p.length<per)return null;return p.slice(-per).reduce((a,b)=>a+b,0)/per}
function calcSigs(prices,chg){
  if(!prices||prices.length<5)return[];
  const s=[],cur=prices[prices.length-1],hi=Math.max(...prices),lo=Math.min(...prices);
  const r=calcRSI(prices),m20=calcMA(prices,Math.min(20,prices.length)),m50=calcMA(prices,Math.min(50,prices.length));
  const pm20=calcMA(prices.slice(0,-1),Math.min(20,prices.length-1)),pm50=calcMA(prices.slice(0,-1),Math.min(50,prices.length-1));
  if(cur>=hi*0.985)s.push({l:"30D High Breakout",st:"strong",i:"🚀"});
  if(cur<=lo*1.015)s.push({l:"30D Low Break",st:"danger",i:"💥"});
  if(r!==null&&r>68)s.push({l:`RSI OB ${r.toFixed(0)}`,st:"caution",i:"🔥"});
  if(r!==null&&r<32)s.push({l:`RSI OS ${r.toFixed(0)}`,st:"opportunity",i:"❄️"});
  if(Math.abs(chg)>4)s.push({l:`Big Move ${chg>0?"+":""}${chg.toFixed(1)}%`,st:chg>0?"strong":"danger",i:chg>0?"📈":"📉"});
  if(m20&&m50&&pm20&&pm50){if(m20>m50&&pm20<=pm50)s.push({l:"Golden Cross",st:"strong",i:"✨"});if(m20<m50&&pm20>=pm50)s.push({l:"Death Cross",st:"danger",i:"☠️"})}
  return s;
}
const SC={strong:["#00ff9520","#00ff95"],danger:["#ff4d4d20","#ff4d4d"],caution:["#ff8c0020","#ff8c00"],opportunity:["#00bfff20","#00bfff"],medium:["#ffd70020","#ffd700"]};
const badge=s=>{const[bg,c]=SC[s.st]||SC.medium;return`<span class="sig" style="background:${bg};border:1px solid ${c};color:${c}">${s.i} ${s.l}</span>`};
function spark(p,col){if(!p||p.length<2)return'';const mn=Math.min(...p),mx=Math.max(...p),r=mx-mn||1,w=80,h=28;const pts=p.map((v,i)=>`${(i/(p.length-1))*w},${h-((v-mn)/r)*h}`).join(' ');return`<svg width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linejoin="round"/></svg>`}

// ── MAIN LIST RENDER ───────────────────────────────────────
function cardHTML(c,i){
  const up=(c.chg||0)>=0,col=up?"#00ff95":"#ff4d4d",has=c.signals.length>0;
  const rc=c.rsi!=null?(c.rsi>68?"ht":c.rsi<32?"cl":""):"";
  return`<div class="card ${has?"hot":""}" style="animation-delay:${i*0.04}s" onclick='openDetail(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
<div class="ctop"><div><div class="cname"><span class="csym">${c.sym}</span>${has?'<span class="abadge">● ALERT</span>':''}</div><div class="cprice">$${fmt(c.price)}</div></div>
<div class="cright"><div class="cchg" style="color:${col}">${up?"+":""}${(c.chg||0).toFixed(2)}%</div>${spark(c.prices,col)}</div></div>
<div class="cstats">${c.rsi!=null?`<span class="cs">RSI <span class="${rc}">${c.rsi.toFixed(1)}</span></span>`:''} ${c.ma20?`<span class="cs">MA20 <span>$${fmt(c.ma20)}</span></span>`:''} ${c.ma50?`<span class="cs">MA50 <span>$${fmt(c.ma50)}</span></span>`:''}</div>
${has?`<div class="sigs">${c.signals.map(badge).join('')}</div>`:''}
<div class="tap-hint">TAP FOR LIVE CHARTS →</div></div>`;
}
function sortData(d){
  if(sortBy==='chg_desc')return[...d].sort((a,b)=>(b.chg||0)-(a.chg||0));
  if(sortBy==='chg_asc')return[...d].sort((a,b)=>(a.chg||0)-(b.chg||0));
  if(sortBy==='rsi_desc')return[...d].sort((a,b)=>(b.rsi||0)-(a.rsi||0));
  if(sortBy==='rsi_asc')return[...d].sort((a,b)=>(a.rsi||50)-(b.rsi||50));
  return[...d].sort((a,b)=>b.signals.length-a.signals.length);
}
function render(){const el=document.getElementById('list');let d=all;if(filt==='alerts')d=all.filter(c=>c.signals.length>0);if(filt==='2+')d=all.filter(c=>c.signals.length>=2);d=sortData(d);el.innerHTML=d.length?d.map((c,i)=>cardHTML(c,i)).join(''):`<div class="empty">No coins match this filter.</div>`}
function setF(f){filt=f;document.querySelectorAll('#flts .fb').forEach(b=>b.classList.remove('on'));document.getElementById({all:'fa',alerts:'fal','2+':'f2'}[f]).classList.add('on');render()}
function setS(s){sortBy=s;document.querySelectorAll('#sorts .fb').forEach(b=>b.classList.remove('on'));document.getElementById({signals:'s1',chg_desc:'s2',chg_asc:'s3',rsi_desc:'s4',rsi_asc:'s5'}[s]).classList.add('on');render()}
function updateStats(){
  const ac=all.filter(c=>c.signals.length>0).length,ts=all.reduce((a,c)=>a+c.signals.length,0),sc=all.filter(c=>c.signals.some(s=>s.st==='strong')).length;
  document.getElementById('vs').textContent=sc;document.getElementById('vsi').textContent=ts;document.getElementById('val').textContent=ac;document.getElementById('vto').textContent=all.length;
  if(ac>0){document.getElementById('vsi').classList.add('g');document.getElementById('val').classList.add('g')}
  document.getElementById('fal').textContent=`🔔 ALERTS (${ac})`;document.getElementById('fa').textContent=`ALL (${all.length})`;
  document.getElementById('stats').style.display='flex';document.getElementById('flts').style.display='flex';document.getElementById('sorts').style.display='flex';
}

// ── MAIN SCAN ──────────────────────────────────────────────
async function scan(){
  const btn=document.getElementById('rbtn'),ico=document.getElementById('rico'),pb=document.getElementById('pb'),pf=document.getElementById('pf'),sub=document.getElementById('sub');
  btn.disabled=true;ico.className='spin';pb.style.display='block';pf.style.width='5%';sub.textContent='Fetching prices...';
  document.getElementById('list').innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:12px">📡</div>Scanning markets...</div>';
  try{
    const ids=COINS.map(c=>c.cg).join(',');
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
    if(!r.ok)throw new Error(`CoinGecko error ${r.status}`);
    const prices=await r.json();
    pf.style.width='30%';sub.textContent='Fetching chart data...';
    const results=[];
    for(let i=0;i<COINS.length;i+=5){
      const batch=COINS.slice(i,i+5);
      const br=await Promise.all(batch.map(async coin=>{
        const pd=prices[coin.cg];
        if(!pd)return{sym:coin.sym,cg:coin.cg,kr:coin.kr,price:0,chg:0,prices:[],rsi:null,ma20:null,ma50:null,signals:[]};
        try{
          const cr=await fetch(`https://api.coingecko.com/api/v3/coins/${coin.cg}/market_chart?vs_currency=usd&days=30`);
          const cd=await cr.json();
          const pp=cd.prices?cd.prices.map(x=>x[1]):[];
          const chg=pd.usd_24h_change||0;
          const rsi=calcRSI(pp),m20=calcMA(pp,Math.min(20,pp.length)),m50=calcMA(pp,Math.min(50,pp.length));
          return{sym:coin.sym,cg:coin.cg,kr:coin.kr,price:pd.usd,chg,prices:pp,rsi,ma20:m20,ma50:m50,signals:calcSigs(pp,chg)};
        }catch{
          return{sym:coin.sym,cg:coin.cg,kr:coin.kr,price:pd.usd||0,chg:pd.usd_24h_change||0,prices:[],rsi:null,ma20:null,ma50:null,signals:[]};
        }
      }));
      results.push(...br);
      pf.style.width=`${30+(results.length/COINS.length)*65}%`;
      sub.textContent=`Scanned ${results.length}/${COINS.length}...`;
      if(i+5<COINS.length)await new Promise(res=>setTimeout(res,1500));
    }
    results.sort((a,b)=>b.signals.length-a.signals.length);
    all=results;pf.style.width='100%';
    sub.textContent=`Live · ${new Date().toLocaleTimeString()}`;
    updateStats();render();
  }catch(e){
    document.getElementById('list').innerHTML=`<div class="errbx">${e.message}<button class="errbt" onclick="scan()">↺ Retry</button></div>`;
    sub.textContent='Scan failed';
  }
  btn.disabled=false;ico.className='';
  setTimeout(()=>{pb.style.display='none';pf.style.width='0%'},1000);
}

// ── DETAIL VIEW ────────────────────────────────────────────
function openDetail(c){
  detailCoin=c;
  detailTF='1d';
  document.getElementById('mainView').style.display='none';
  document.getElementById('detailView').classList.add('open');
  document.getElementById('dSym').textContent=c.sym;
  document.getElementById('dPrice').textContent='$'+fmt(c.price);
  const up=(c.chg||0)>=0;
  const chgEl=document.getElementById('dChg');
  chgEl.textContent=(up?"+":"")+((c.chg||0).toFixed(2))+'%';
  chgEl.style.color=up?'#00ff95':'#ff4d4d';
  // Set 1D active by default
  document.querySelectorAll('.dtf').forEach(b=>b.classList.remove('on'));
  document.getElementById('dtf1d').classList.add('on');
  loadDetail('1D');
}
function closeDetail(){
  if(liveInterval){clearInterval(liveInterval);liveInterval=null;}
  document.getElementById('detailView').classList.remove('open');
  document.getElementById('mainView').style.display='block';
  detailCoin=null;
}

async function loadDetail(tf){
  detailTF=tf;
  document.querySelectorAll('.dtf').forEach(b=>b.classList.remove('on'));
  const idMap={'1m':'dtf1m','5m':'dtf5m','15m':'dtf15m','30m':'dtf30m','1h':'dtf1h','4h':'dtf4h','1D':'dtf1d','1W':'dtf1w'};
  if(document.getElementById(idMap[tf]))document.getElementById(idMap[tf]).classList.add('on');
  if(liveInterval){clearInterval(liveInterval);liveInterval=null;}
  document.getElementById('chartTitle').textContent=`LOADING ${tf} DATA...`;
  document.getElementById('dStats').innerHTML='<div style="color:#7788aa;font-size:12px">Loading...</div>';
  document.getElementById('dSigsEl').innerHTML='';

  // Try Kraken first
  const minutes=KR_INT[tf]||1440;
  let prices=[], source='', candleData=null;
  try{
    const kr=await fetch(`https://api.kraken.com/0/public/OHLC?pair=${detailCoin.kr}USD&interval=${minutes}&since=0`);
    const kd=await kr.json();
    if(kd.error&&kd.error.length>0)throw new Error(kd.error[0]);
    const key=Object.keys(kd.result).find(k=>k!=='last');
    const candles=kd.result[key];
    const candleData = candles.map(c=>({
      time: parseInt(c[0]),
      open: parseFloat(c[1]),
      high: parseFloat(c[2]),
      low: parseFloat(c[3]),
      close: parseFloat(c[4]),
    })).filter((c,i,arr)=>i===0||c.time>arr[i-1].time);
    prices=candleData.map(c=>c.close);
    source=`Kraken · ${tf} · ${prices.length} candles`;
  }catch(e){
    // Fallback to CoinGecko daily
    try{
      const days=tf==='1W'?365:90;
      const cgr=await fetch(`https://api.coingecko.com/api/v3/coins/${detailCoin.cg}/market_chart?vs_currency=usd&days=${days}`);
      const cgd=await cgr.json();
      prices=cgd.prices?cgd.prices.map(x=>x[1]):[];
      source=`CoinGecko · Daily fallback · ${prices.length} points`;
      candleData=null;
    }catch(e2){
      document.getElementById('chartTitle').textContent='Failed to load chart data';
      return;
    }
  }

  detailData=prices;
  renderDetailChart(candleData||null, prices, tf);
  renderDetailStats(prices,source);

  // Live price refresh every 15s
  liveInterval=setInterval(async()=>{
    try{
      const kr=await fetch(`https://api.kraken.com/0/public/Ticker?pair=${detailCoin.kr}USD`);
      const kd=await kr.json();
      const key=Object.keys(kd.result)[0];
      const livePrice=parseFloat(kd.result[key].c[0]);
      document.getElementById('dPrice').textContent='$'+fmt(livePrice);
    }catch{}
  },15000);
}

function renderDetailChart(candles, prices, tf){
  // Destroy old charts
  if(priceChartInstance){priceChartInstance.remove();priceChartInstance=null;}
  if(rsiChartInstance){rsiChartInstance.remove();rsiChartInstance=null;}

  const chartOpts = {
    layout:{background:{color:'#0a0f14'},textColor:'#7788aa'},
    grid:{vertLines:{color:'#1e2530'},horzLines:{color:'#1e2530'}},
    crosshair:{mode:1},
    rightPriceScale:{borderColor:'#1e2530'},
    timeScale:{borderColor:'#1e2530',timeVisible:true,secondsVisible:false},
    handleScroll:true,
    handleScale:true,
  };

  // Price chart
  const priceEl = document.getElementById('priceChart');
  priceEl.innerHTML = '';
  priceChartInstance = LightweightCharts.createChart(priceEl, {...chartOpts, height:220});

  if(candles && candles.length > 1){
    // Candlestick series
    const candleSeries = priceChartInstance.addCandlestickSeries({
      upColor:'#00ff95', downColor:'#ff4d4d',
      borderUpColor:'#00ff95', borderDownColor:'#ff4d4d',
      wickUpColor:'#00ff95', wickDownColor:'#ff4d4d',
    });
    candleSeries.setData(candles);
    // MA20 line
    const ma20data = [];
    for(let i=19;i<candles.length;i++){
      const avg = candles.slice(i-19,i+1).reduce((s,c)=>s+c.close,0)/20;
      ma20data.push({time:candles[i].time, value:avg});
    }
    const ma20series = priceChartInstance.addLineSeries({color:'#ffd700',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,title:'MA20'});
    ma20series.setData(ma20data);
    // MA50 line
    const ma50data = [];
    for(let i=49;i<candles.length;i++){
      const avg = candles.slice(i-49,i+1).reduce((s,c)=>s+c.close,0)/50;
      ma50data.push({time:candles[i].time, value:avg});
    }
    const ma50series = priceChartInstance.addLineSeries({color:'#ff8c00',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,title:'MA50'});
    ma50series.setData(ma50data);
    priceChartInstance.timeScale().fitContent();
  } else if(prices && prices.length > 1){
    // Fallback area chart
    const areaSeries = priceChartInstance.addAreaSeries({
      lineColor:'#00ff95', topColor:'#00ff9530', bottomColor:'transparent', lineWidth:2
    });
    const lineData = prices.map((v,i)=>({time:Math.floor(Date.now()/1000)-((prices.length-1-i)*86400), value:v}));
    areaSeries.setData(lineData);
    priceChartInstance.timeScale().fitContent();
  }

  // RSI chart
  const rsiEl = document.getElementById('rsiChart');
  rsiEl.innerHTML = '';
  rsiChartInstance = LightweightCharts.createChart(rsiEl, {
    ...chartOpts, height:100,
    rightPriceScale:{...chartOpts.rightPriceScale, scaleMargins:{top:0.1,bottom:0.1}},
  });
  const rsiSeries = rsiChartInstance.addLineSeries({color:'#00ff95',lineWidth:2,priceLineVisible:false,lastValueVisible:true});
  const obLine = rsiChartInstance.addLineSeries({color:'#ff4d4d',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});
  const osLine = rsiChartInstance.addLineSeries({color:'#00bfff',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});

  if(prices && prices.length > 15){
    const rsiData=[], obData=[], osData=[];
    for(let i=14;i<prices.length;i++){
      const t = candles && candles[i] ? candles[i].time : Math.floor(Date.now()/1000)-((prices.length-1-i)*86400);
      const r=calcRSI(prices.slice(0,i+1));
      if(r!=null){
        rsiData.push({time:t,value:r});
        obData.push({time:t,value:70});
        osData.push({time:t,value:30});
      }
    }
    rsiSeries.setData(rsiData);
    obLine.setData(obData);
    osLine.setData(osData);
    rsiChartInstance.timeScale().fitContent();
  }

  document.getElementById('chartTitle').innerHTML=`<span class="live-dot"></span>${detailCoin.sym} · ${tf} CHART`;
}

function renderDetailStats(prices,source){
  const rsi=calcRSI(prices),m20=calcMA(prices,Math.min(20,prices.length)),m50=calcMA(prices,Math.min(50,prices.length));
  const chg=detailCoin.chg||0;
  const rc=rsi!=null?(rsi>68?"ht":rsi<32?"cl":""):"";
  document.getElementById('dStats').innerHTML=`
    <div class="dst"><div class="dst-label">PRICE</div><div class="dst-val">$${fmt(detailCoin.price)}</div></div>
    <div class="dst"><div class="dst-label">24H</div><div class="dst-val" style="color:${chg>=0?'#00ff95':'#ff4d4d'}">${chg>=0?"+":""}${chg.toFixed(2)}%</div></div>
    <div class="dst"><div class="dst-label">RSI</div><div class="dst-val ${rc}">${rsi!=null?rsi.toFixed(1):'N/A'}</div></div>
    <div class="dst"><div class="dst-label">MA20</div><div class="dst-val">$${fmt(m20)}</div></div>
    <div class="dst"><div class="dst-label">MA50</div><div class="dst-val">$${fmt(m50)}</div></div>`;
  const sigs=calcSigs(prices,chg);
  document.getElementById('dSigsEl').innerHTML=sigs.map(badge).join('');
  document.getElementById('dSrc').textContent='Source: '+source;
  // Update AI button data
  document.getElementById('dAiBtn')._data={sym:detailCoin.sym,price:detailCoin.price,chg,rsi,ma20:m20,ma50:m50,signals:sigs};
}

// ── AI ANALYST ─────────────────────────────────────────────
function openAIDetail(){
  const d=document.getElementById('dAiBtn')._data;
  if(!d)return;
  document.getElementById('ov').style.display='flex';
  document.getElementById('ptitle').textContent=`⚡ AI ANALYST — ${d.sym}`;
  document.getElementById('psigs').innerHTML=(d.signals||[]).map(badge).join('');
  document.getElementById('pbody').innerHTML='<span class="ana">● Analyzing...</span>';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Crypto analyst. 3-4 sentences, risk level Low/Medium/High. No disclaimers.\n${d.sym} $${fmt(d.price)} 24h:${(d.chg||0).toFixed(2)}% RSI:${d.rsi?d.rsi.toFixed(1):'N/A'} MA20:$${fmt(d.ma20)} MA50:$${fmt(d.ma50)}\nSignals: ${(d.signals||[]).map(s=>s.l).join(', ')||'None'}`}]})})
  .then(r=>r.json()).then(d=>{document.getElementById('pbody').textContent=d.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'No analysis.'})
  .catch(e=>{document.getElementById('pbody').textContent='AI unavailable: '+e.message});
}
function closeAI(){document.getElementById('ov').style.display='none'}

// ── INIT ───────────────────────────────────────────────────
scan();
setInterval(scan,5*60*1000);
</script>
